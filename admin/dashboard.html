<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - Rowan Toys</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e12;
      --surface: #16161c;
      --surface2: #1e1e27;
      --border: #2a2a38;
      --text: #e8e8f0;
      --muted: #7070a0;
      --accent: #ff6b35;
      --red: #ef4444;
      --r: 14px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 40px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--accent);
      margin: 0;
    }
    .btn-logout {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .card h2 {
      font-size: 18px;
      margin-bottom: 12px;
    }
    .card p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
  <script>
    // Simple client-side check to see if user logged in
    if (sessionStorage.getItem('isAdmin') !== 'true') {
      window.location.href = 'index.html';
    }

    function logout() {
      sessionStorage.removeItem('isAdmin');
      window.location.href = 'index.html';
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Admin Dashboard</h1>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <h2>Welcome to the Admin Area</h2>
      <p>This section is currently under development. Here you will be able to manage the catalog, upload new products, and update inventory settings.</p>
    </div>
  </div>
</body>
</html>
